<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloques</title>
</head>
<body>
    <h1>Cajas contenedoras</h1>
    <p style="border: 3px solid red;">Hola soy un parrafo</p>
    <span style="border: 3px solid blue;">Hola soy un span</span>
    <a href="#" style="border: 3px solid orange;">Hola soy un link</a>
    <h2 style="display: inline;">Bloque H2</h2>
    <inventada style="border: 3px solid green;">Hola soy un invento</inventada>

    <hr>

    <h2>Display vs tamaño</h2>
    <p>Texto de muestra con <span style="border: 3px solid violet; width: 100px; height: 100px;">un span</span> sin modificar</p>

    <p>Texto de muestra con <span style="border: 3px solid violet; width: 100px; height: 100px; display: block;">un span</span> modificado</p>

    <p>Texto de muestra con <span style="border: 3px solid violet; width: 100px; height: 100px; display: inline-block;">un span</span> modificado</p>
</body>
</html>
