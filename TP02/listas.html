<!DOCTYPE html>
<html lang="es-AR">
<head>

    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Listas</h1>
    <h2>Listas desordenadas</h2>
    <ul>
        <li>Café</li>
        <li>Yerbá</li>
        <li>Azucar</li>
        <li>Té</li>
    </ul>
    <h2>Lista ordenada</h2>
    <ol>
        <li>Venir al curso</li>
        <li>Prácticar</li>
        <li>Frustrarse</li>
        <li>Aprender</li>
    </ol>
</body>
</html>
